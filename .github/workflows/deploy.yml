name: Deploy to GitHub Pages

# Deployment moved to Cloudflare (Pages/Workers), which builds from this repo
# automatically. GitHub Pages is retired, so this no longer runs on push — it
# only runs if triggered manually. To bring GitHub Pages back: enable it in
# Settings -> Pages -> Source: "GitHub Actions", then re-add the push trigger.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Guard against the classic "hello world" deploy: fail fast if the
      # artifact we are about to publish is not the real app.
      - name: Verify site content before upload
        run: |
          grep -q "Budiasta" index.html
          test -f src/main.js
          test -f data/puebi_eyd_rules.json
          python3 -c "import json; json.load(open('data/puebi_eyd_rules.json'))"

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
